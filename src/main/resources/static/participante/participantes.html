  <body
    class="font-body-md text-on-surface min-h-screen flex flex-col h-full overflow-x-hidden page-background"

    <!-- NavigationDrawer -->

    <!-- Main Canvas -->
    <div
      class="flex flex-col min-h-screen relative transition-sidebar flex-1"

          max-height: 64px !important;

    <!-- Modal: Registrar Participante -->
    <div
      class="hidden fixed inset-0 z-[110] flex items-center justify-center p-4"
      id="participantModal"

      <div

        onclick="closeModal()"
      ></div>
      <div
        class="relative bg-white rounded-xl shadow-2xl w-full max-w-lg overflow-hidden animate-in fade-in zoom-in duration-300"
      >
        <div
          class="bg-olympic-red p-6 text-white flex justify-between items-center"
        >
          <h3 class="font-title-lg">Registrar Participante</h3>
          <button
            class="hover:bg-white/10 p-1 rounded-full transition-colors"
            onclick="closeModal()"
          >
            <span class="material-symbols-outlined">close</span>

        </div>
        <div class="p-6 md:p-8 flex flex-col gap-md">
          <input type="hidden" id="participanteId" />
          <div class="space-y-1">
            <div class="space-y-1">
              <label
                class="block font-label-md text-sm text-gray-500 uppercase tracking-wide"
              >
                Nombres
              </label>

              <input
                id="nombresParticipante"
                class="w-full border-gray-300 rounded-lg"

                type="text"
              />
            </div>

            <div class="space-y-1">
              <label
                class="block font-label-md text-sm text-gray-500 uppercase tracking-wide"
              >
                Apellidos
              </label>

              <input
                id="apellidosParticipante"
                class="w-full border-gray-300 rounded-lg"
                placeholder="Ej: Pérez"
                type="text"
              />
            </div>
          </div>
          <div class="space-y-1">
            <label
              class="block font-label-md text-sm text-gray-500 uppercase tracking-wide"
              >DNI / Documento</label
            >
            <input
              id="dniParticipante"
              class="w-full border-gray-300 rounded-lg focus:ring-olympic-red focus:border-olympic-red font-body-md"
              placeholder="8 dígitos"
              type="text"
            />
          </div>
          <div class="space-y-1">
            <label
              class="block font-label-md text-sm text-gray-500 uppercase tracking-wide"
              >Edad</label
            >
            <input
              id="edadParticipante"
              class="w-full border-gray-300 rounded-lg focus:ring-olympic-red focus:border-olympic-red font-body-md"
              placeholder="Ejem: 25"
              type="number"
            />
          </div>
          <div class="space-y-1">
            <label
              class="block font-label-md text-sm text-gray-500 uppercase tracking-wide"
            >
              Equipo
            </label>

            <select
              id="equipoParticipante"
              class="w-full border-gray-300 rounded-lg"
            >
              <option value="">Seleccione equipo</option>
            </select>
          </div>
          <div class="flex flex-col sm:flex-row gap-4 pt-4">
            <button
              class="w-full px-6 py-3 border border-gray-300 rounded-lg font-bold text-gray-600 hover:bg-gray-50 transition-colors"
              onclick="closeModal()"
            >
              Cancelar
            </button>
            <button
              onclick="guardarParticipante()"
              class="w-full px-6 py-3 bg-olympic-red text-white rounded-lg font-bold hover:brightness-110 transition-colors shadow-lg"
            >
              Guardar Participante
            </button>
          </div>
        </div>
      </div>
    </div>
    <script>
      const API_PARTICIPANTES = "/api/participantes";
      const API_EQUIPOS = "/api/equipos";

      let participantesOriginales = [];
      let equiposOriginales = [];

      document.addEventListener("DOMContentLoaded", () => {
        cargarEquipos();
        cargarParticipantes();
      });

      function openModal() {
        limpiarFormularioParticipante();
        document.getElementById("participantModal").classList.remove("hidden");
        document.body.style.overflow = "hidden";
      }

      function closeModal() {
        document.getElementById("participantModal").classList.add("hidden");
        document.body.style.overflow = "";
      }

      function cargarEquipos() {
        fetch(API_EQUIPOS)
          .then((response) => response.json())
          .then((data) => {
            const institucionParticipante = "UTP";

            const equiposFiltrados = data.filter(
              (equipo) =>
                (equipo.institucion?.nombre || "").trim().toLowerCase() ===
                institucionParticipante.trim().toLowerCase(),
            );

            equiposOriginales = equiposFiltrados;

            const select = document.getElementById("equipoParticipante");
            select.innerHTML = `<option value="">Seleccione equipo</option>`;

            equiposFiltrados.forEach((equipo) => {
              select.innerHTML += `
          <option value="${equipo.id}">
            ${equipo.nombre} - ${equipo.deporte?.nombre || ""}
          </option>
        `;
            });
          });
      }

      function cargarParticipantes() {
        fetch(API_PARTICIPANTES)
          .then((response) => response.json())
          .then((data) => {
            const institucionParticipante = "UTP";

            const participantesFiltrados = data.filter(
              (p) =>
                (p.equipo?.institucion?.nombre || "").trim().toLowerCase() ===
                institucionParticipante.trim().toLowerCase(),
            );

            participantesOriginales = participantesFiltrados;
            renderizarParticipantes(participantesFiltrados);
          })
          .catch((error) => {
            console.error(error);
            alert("Error al cargar participantes");
          });
      }

      function renderizarParticipantes(data) {
        const tabla = document.getElementById("tablaParticipantes");
        tabla.innerHTML = "";

        data.forEach((item) => {
          tabla.innerHTML += `
      <tr class="hover:bg-surface-container-lowest transition-colors group">
        <td class="px-6 py-4">
          <div class="flex items-center gap-4">
            <div class="w-10 h-10 rounded-full bg-primary text-white flex items-center justify-center font-bold">
              ${item.nombres ? item.nombres.charAt(0).toUpperCase() : "P"}
            </div>
            <div>
              <div class="font-bold text-on-surface">
                ${item.nombres || ""} ${item.apellidos || ""}
              </div>
              <div class="text-caption text-on-surface-variant">
                ${item.equipo?.nombre || "Sin equipo"}
              </div>
            </div>
          </div>
        </td>

        <td class="px-6 py-4">
          <span class="font-body-md text-sm text-on-surface">
            ${item.dni || ""}
          </span>
        </td>

        <td class="px-6 py-4">
          <span class="font-body-md text-sm text-on-surface">
            ${item.edad || ""}
          </span>
        </td>

        <td class="px-6 py-4">
          <span class="px-sm py-1 bg-surface-container-high text-on-surface-variant rounded-full font-caption text-[10px] font-bold uppercase tracking-wider">
            ${item.equipo?.deporte?.nombre || "Sin deporte"}
          </span>
        </td>

        <td class="px-6 py-4 text-right">
          <div class="flex justify-end gap-2">
            <button onclick='editarParticipante(${JSON.stringify(item)})'
              class="p-2 text-primary hover:bg-primary/5 rounded-lg transition-colors">
              <span class="material-symbols-outlined text-xl">edit</span>
            </button>

            <button onclick="eliminarParticipante(${item.id})"
              class="p-2 text-error hover:bg-error/5 rounded-lg transition-colors">
              <span class="material-symbols-outlined text-xl">delete</span>
            </button>
          </div>
        </td>
      </tr>
    `;
        });
      }

      function guardarParticipante() {
        const id = document.getElementById("participanteId").value;
        const nombres = document
          .getElementById("nombresParticipante")
          .value.trim();
        const apellidos = document
          .getElementById("apellidosParticipante")
          .value.trim();
        const dni = document.getElementById("dniParticipante").value.trim();
        const edad = document.getElementById("edadParticipante").value;
        const equipoId = document.getElementById("equipoParticipante").value;

        if (!nombres || !apellidos || !dni || !edad || !equipoId) {
          alert("Complete todos los campos obligatorios");
          return;
        }

        const participante = {
          nombres,
          apellidos,
          dni,
          edad,
          equipo: {
            id: parseInt(equipoId),
          },
        };

        const url = id ? `${API_PARTICIPANTES}/${id}` : API_PARTICIPANTES;
        const metodo = id ? "PUT" : "POST";

        fetch(url, {
          method: metodo,
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify(participante),
        })
          .then((response) => response.json())
          .then(() => {
            closeModal();
            cargarParticipantes();
            alert(id ? "Participante actualizado" : "Participante registrado");
          })
          .catch((error) => {
            console.error(error);
            alert("Error al guardar participante");
          });
      }

      function editarParticipante(item) {
        document.getElementById("participanteId").value = item.id;
        document.getElementById("nombresParticipante").value =
          item.nombres || "";
        document.getElementById("apellidosParticipante").value =
          item.apellidos || "";
        document.getElementById("dniParticipante").value = item.dni || "";
        document.getElementById("edadParticipante").value = item.edad || "";
        document.getElementById("equipoParticipante").value =
          item.equipo?.id || "";

        document.getElementById("participantModal").classList.remove("hidden");
        document.body.style.overflow = "hidden";
      }

      function eliminarParticipante(id) {
        const confirmar = confirm(
          "¿Seguro que deseas eliminar este participante?",
        );

        if (!confirmar) return;

        fetch(`${API_PARTICIPANTES}/${id}`, {
          method: "DELETE",
        })
          .then((response) => response.text())
          .then(() => {
            cargarParticipantes();
            alert("Participante eliminado correctamente");
          })
          .catch((error) => {
            console.error(error);
            alert("Error al eliminar participante");
          });
      }

      function limpiarFormularioParticipante() {
        document.getElementById("participanteId").value = "";
        document.getElementById("nombresParticipante").value = "";
        document.getElementById("apellidosParticipante").value = "";
        document.getElementById("dniParticipante").value = "";
        document.getElementById("edadParticipante").value = "";
        document.getElementById("equipoParticipante").value = "";
      }

      function filtrarParticipantes() {
        const texto = document
          .getElementById("buscarParticipante")
          .value.toLowerCase();

        const filtrados = participantesOriginales.filter((item) => {
          const nombreCompleto =
            `${item.nombres || ""} ${item.apellidos || ""}`.toLowerCase();
          const dni = (item.dni || "").toLowerCase();

          return nombreCompleto.includes(texto) || dni.includes(texto);
        });

        renderizarParticipantes(filtrados);
      }
    </script>
  </body>
