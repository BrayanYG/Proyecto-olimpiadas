    <script>
      const API_EQUIPOS = "http://localhost:8081/api/equipos";
      const API_PARTICIPANTES = "http://localhost:8081/api/participantes";
      const API_INSTITUCIONES = "http://localhost:8081/api/instituciones";
      const API_DEPORTES = "http://localhost:8081/api/deportes";

      document.addEventListener("DOMContentLoaded", () => {
        cargarEquipos();
        cargarParticipantes();
        cargarInstituciones();
        cargarDeportes();

        document
          .getElementById("buscarParticipante")
          .addEventListener("input", filtrarParticipantes);

        document
          .getElementById("filtroInstitucion")
          .addEventListener("change", filtrarParticipantes);

        document
          .getElementById("filtroEquipo")
          .addEventListener("change", filtrarParticipantes);

        document
          .getElementById("filtroDeporte")
          .addEventListener("change", filtrarParticipantes);
      });

      function abrirModalParticipante() {
        document.getElementById("modalParticipante").classList.remove("hidden");

        document.getElementById("modalParticipante").classList.add("flex");
      }

      function cerrarModalParticipante() {
        document.getElementById("modalParticipante").classList.add("hidden");

        document.getElementById("modalParticipante").classList.remove("flex");
      }

      function cargarEquipos() {
        fetch(API_EQUIPOS)
          .then((response) => response.json())
          .then((data) => {
            const selectModal = document.getElementById("equipo");
            const selectFiltro = document.getElementById("filtroEquipo");

            selectModal.innerHTML = `<option value="">Seleccione equipo</option>`;
            selectFiltro.innerHTML = `<option value="">Todos los equipos</option>`;

            data.forEach((item) => {
              selectModal.innerHTML += `
          <option value="${item.id}">
            ${item.nombre} - ${item.deporte?.nombre || ""}
          </option>
        `;

              selectFiltro.innerHTML += `
          <option value="${item.nombre}">
            ${item.nombre}
          </option>
        `;
            });
          })
          .catch((error) => {
            console.error(error);
            alert("Error al cargar equipos");
          });
      }

      function guardarParticipante() {
        const id = document.getElementById("participanteId").value;

        const nombres = document.getElementById("nombres").value.trim();

        const apellidos = document.getElementById("apellidos").value.trim();

        const dni = document.getElementById("dni").value.trim();

        const edad = document.getElementById("edad").value;

        const correo = document.getElementById("correo").value.trim();

        const telefono = document.getElementById("telefono").value.trim();

        const equipoId = document.getElementById("equipo").value;

        if (!nombres || !apellidos || !dni || !edad || !equipoId) {
          alert("Complete los campos obligatorios");

          return;
        }

        const participante = {
          nombres,
          apellidos,
          dni,
          edad,
          correo,
          telefono,

          equipo: {
            id: parseInt(equipoId),
          },
        };

        const url = id ? `${API_PARTICIPANTES}/${id}` : API_PARTICIPANTES;

        const metodo = id ? "PUT" : "POST";

        fetch(url, {
          method: metodo,

          headers: {
            "Content-Type": "application/json",
          },

          body: JSON.stringify(participante),
        })
          .then((response) => response.json())

          .then(() => {
            cerrarModalParticipante();

            limpiarFormularioParticipante();

            cargarParticipantes();

            alert(id ? "Participante actualizado" : "Participante registrado");
          })

          .catch((error) => {
            console.error(error);

            alert("Error al guardar participante");
          });
      }

      function cargarParticipantes() {
        fetch(API_PARTICIPANTES)
          .then((response) => response.json())
          .then((data) => {
            participantesGlobal = data;
            renderizarParticipantes(data);
          })
          .catch((error) => {
            console.error(error);
            alert("Error al cargar participantes");
          });
      }

      function limpiarFormularioParticipante() {
        document.getElementById("participanteId").value = "";

        document.getElementById("nombres").value = "";

        document.getElementById("apellidos").value = "";

        document.getElementById("dni").value = "";

        document.getElementById("edad").value = "";

        document.getElementById("correo").value = "";

        document.getElementById("telefono").value = "";

        document.getElementById("equipo").value = "";
      }

      function editarParticipante(item) {
        document.getElementById("participanteId").value = item.id;
        document.getElementById("nombres").value = item.nombres || "";
        document.getElementById("apellidos").value = item.apellidos || "";
        document.getElementById("dni").value = item.dni || "";
        document.getElementById("edad").value = item.edad || "";
        document.getElementById("correo").value = item.correo || "";
        document.getElementById("telefono").value = item.telefono || "";
        document.getElementById("equipo").value = item.equipo?.id || "";

        abrirModalParticipante();
      }

      function eliminarParticipante(id) {
        const confirmar = confirm(
          "¿Seguro que deseas eliminar este participante?",
        );

        if (!confirmar) return;

        fetch(`${API_PARTICIPANTES}/${id}`, {
          method: "DELETE",
        })
          .then((response) => response.text())
          .then(() => {
            cargarParticipantes();
            alert("Participante eliminado correctamente");
          })
          .catch((error) => {
            console.error(error);
            alert("Error al eliminar participante");
          });
      }

      let participantesGlobal = [];

      function cargarInstituciones() {
        fetch(API_INSTITUCIONES)
          .then((response) => response.json())

          .then((data) => {
            const select = document.getElementById("filtroInstitucion");

            select.innerHTML = `<option value="">Todas las instituciones</option>`;

            data.forEach((item) => {
              select.innerHTML += `
          <option value="${item.nombre}">
            ${item.nombre}
          </option>
        `;
            });
          });
      }

      function cargarDeportes() {
        fetch(API_DEPORTES)
          .then((response) => response.json())

          .then((data) => {
            const select = document.getElementById("filtroDeporte");

            select.innerHTML = `<option value="">Todos los deportes</option>`;

            data.forEach((item) => {
              select.innerHTML += `
          <option value="${item.nombre}">
            ${item.nombre}
          </option>
        `;
            });
          });
      }

      function filtrarParticipantes() {
        const texto = document
          .getElementById("buscarParticipante")
          .value.toLowerCase();

        const institucion = document
          .getElementById("filtroInstitucion")
          .value.trim()
          .toLowerCase();

        const equipo = document
          .getElementById("filtroEquipo")
          .value.trim()
          .toLowerCase();

        const deporte = document
          .getElementById("filtroDeporte")
          .value.trim()
          .toLowerCase();

        const filtrados = participantesGlobal.filter((item) => {
          const nombreCompleto =
            `${item.nombres} ${item.apellidos}`.toLowerCase();

          const dni = item.dni?.toLowerCase() || "";

          const nombreInstitucion = (item.equipo?.institucion?.nombre || "")
            .trim()
            .toLowerCase();

          const nombreEquipo = (item.equipo?.nombre || "").trim().toLowerCase();

          const nombreDeporte = (item.equipo?.deporte?.nombre || "")
            .trim()
            .toLowerCase();

          return (
            (nombreCompleto.includes(texto) || dni.includes(texto)) &&
            (!institucion || nombreInstitucion === institucion) &&
            (!equipo || nombreEquipo === equipo) &&
            (!deporte || nombreDeporte === deporte)
          );
        });

        renderizarParticipantes(filtrados);
      }

      function renderizarParticipantes(data) {
        const tabla = document.getElementById("tablaParticipantes");
        const contador = document.getElementById("contadorParticipantes");

        tabla.innerHTML = "";
        contador.textContent = `${data.length} Total`;

        document.getElementById("textoPaginacionParticipantes").textContent =
          `Mostrando ${data.length} participantes`;

        data.forEach((item) => {
          // aquí va todo tu tabla.innerHTML += `...`
          tabla.innerHTML = "";
          contador.textContent = `${data.length} Total`;
          document.getElementById("textoPaginacionParticipantes").textContent =
            `Mostrando ${data.length} participantes`;

          data.forEach((item) => {
            tabla.innerHTML += `
          <tr class="hover:bg-surface-container-low transition-colors">
            <td class="py-4 px-6">
              <div class="w-10 h-10 rounded-full bg-primary text-white flex items-center justify-center font-bold">
                ${item.nombres ? item.nombres.charAt(0).toUpperCase() : "P"}
              </div>
            </td>

            <td class="py-4 px-6 font-bold text-on-surface">
              ${item.nombres || ""} ${item.apellidos || ""}
            </td>

            <td class="py-4 px-6 text-on-surface-variant">
              ${item.dni || ""}
            </td>

            <td class="py-4 px-6 text-on-surface-variant">
              ${item.equipo?.institucion?.nombre || "Sin institución"}
            </td>

            <td class="py-4 px-6 text-on-surface-variant">
              ${item.equipo?.nombre || "Sin equipo"}
            </td>

            <td class="py-4 px-6">
              <span class="px-2 py-1 bg-secondary-container text-on-secondary-container text-xs rounded-full font-bold uppercase">
                ${item.equipo?.deporte?.nombre || "Sin deporte"}
              </span>
            </td>

            <td class="py-4 px-6 text-right space-x-1">
              <button onclick='editarParticipante(${JSON.stringify(item)})'
                class="p-2 text-primary hover:bg-primary/10 rounded-full transition-colors">
                <span class="material-symbols-outlined">edit</span>
              </button>

              <button onclick="eliminarParticipante(${item.id})"
                class="p-2 text-error hover:bg-error/10 rounded-full transition-colors">
                <span class="material-symbols-outlined">delete</span>
              </button>
            </td>
          </tr>
        `;
          });
        });
      }
    </script>
  </body>
</html>
