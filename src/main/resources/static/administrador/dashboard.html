<!doctype html>

<html class="light" lang="es">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Gestión de las olimpiadas - Panel de Control</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-dim": "#dcd9d9",
              "primary-fixed-dim": "#ffb3ad",
              "on-primary": "#ffffff",
              "on-surface": "#1c1b1b",
              "on-error": "#ffffff",
              "surface-container": "#f0eded",
              "on-primary-container": "#ffecea",
              "secondary-fixed": "#e2e2e2",
              "surface-bright": "#fcf9f8",
              "on-surface-variant": "#5d3f3c",
              background: "#fcf9f8",
              "surface-variant": "#e5e2e1",
              "surface-container-highest": "#e5e2e1",
              "on-secondary-fixed-variant": "#454747",
              "secondary-fixed-dim": "#c6c6c7",
              "inverse-primary": "#ffb3ad",
              "inverse-surface": "#313030",
              "on-tertiary-fixed": "#1a1c1c",
              tertiary: "#535555",
              "on-primary-fixed": "#410003",
              surface: "#fcf9f8",
              "primary-container": "#d91023",
              "on-tertiary-fixed-variant": "#454747",
              outline: "#926e6b",
              "inverse-on-surface": "#f3f0ef",
              "tertiary-container": "#6c6d6d",
              "surface-container-lowest": "#ffffff",
              "on-secondary-container": "#616363",
              "on-error-container": "#93000a",
              "surface-container-high": "#eae7e7",
              "on-secondary-fixed": "#1a1c1c",
              primary: "#ad0017",
              "on-primary-fixed-variant": "#930011",
              "surface-container-low": "#f6f3f2",
              error: "#ba1a1a",
              "on-background": "#1c1b1b",
              "tertiary-fixed": "#e2e2e2",
              "outline-variant": "#e7bdb9",
              "primary-fixed": "#ffdad6",
              "secondary-container": "#dfe0e0",
              "tertiary-fixed-dim": "#c6c6c7",
              "on-secondary": "#ffffff",
              "surface-tint": "#c0001a",
              secondary: "#5d5f5f",
              "on-tertiary-container": "#f0f0f0",
              "on-tertiary": "#ffffff",
              "error-container": "#ffdad6",
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
            spacing: {
              "margin-mobile": "16px",
              xl: "64px",
              "margin-desktop": "32px",
              md: "24px",
              base: "8px",
              xs: "4px",
              gutter: "20px",
              lg: "40px",
              sm: "12px",
            },
            fontFamily: {
              "headline-xl": ["Lexend"],
              "label-md": ["Lexend"],
              "body-md": ["Lexend"],
              "display-lg": ["Lexend"],
              "title-lg": ["Lexend"],
              "headline-md": ["Lexend"],
              caption: ["Lexend"],
              "body-lg": ["Lexend"],
            },
            fontSize: {
              "headline-xl": [
                "48px",
                {
                  lineHeight: "1.2",
                  letterSpacing: "-0.01em",
                  fontWeight: "700",
                },
              ],
              "label-md": ["14px", { lineHeight: "1.2", fontWeight: "600" }],
              "body-md": ["16px", { lineHeight: "1.5", fontWeight: "400" }],
              "display-lg": [
                "64px",
                {
                  lineHeight: "1.1",
                  letterSpacing: "-0.02em",
                  fontWeight: "800",
                },
              ],
              "title-lg": ["20px", { lineHeight: "1.4", fontWeight: "600" }],
              "headline-md": ["32px", { lineHeight: "1.3", fontWeight: "700" }],
              caption: ["12px", { lineHeight: "1.2", fontWeight: "500" }],
              "body-lg": ["18px", { lineHeight: "1.6", fontWeight: "400" }],
            },
          },
        },
      };
    </script>
    <style>
      body {
        font-family: "Lexend", sans-serif;
        overflow-x: hidden;
      }
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      .bg-peruvian-gradient {
        background: linear-gradient(135deg, #ad0017 0%, #d91023 100%);
      }
      .podium-1 {
        height: 120px;
      }
      .podium-2 {
        height: 90px;
      }
      .podium-3 {
        height: 60px;
      }

      /* Sidebar transition and state */
      #sidebar {
        transition:
          width 0.3s ease,
          transform 0.3s ease;
      }
      .sidebar-collapsed {
        width: 80px !important;
      }
      .sidebar-collapsed .nav-label,
      .sidebar-collapsed .config-text {
        display: none;
      }
      .sidebar-collapsed nav a {
        justify-content: center;
        padding-left: 0;
        padding-right: 0;
      }
      .sidebar-collapsed .material-symbols-outlined {
        margin: 0;
      }

      @media (max-width: 767px) {
        #sidebar {
          transform: translateX(-100%);
          position: fixed;
          width: 288px !important;
        }
        #sidebar.mobile-open {
          transform: translateX(0);
        }
        #main-content {
          margin-left: 0 !important;
        }
      }
    </style>
    <script src="../js/sidebar.js"></script>
    <link rel="stylesheet" href="../css/style.css" />
    <script src="../js/header.js"></script>
    <script src="../js/auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../js/dashboard.js" defer></script>
  </head>
  <body class="admin-theme">
    <!-- TopAppBar -->
    <header></header>
    <!-- Overlay for Mobile Sidebar -->
    <div
      class="fixed inset-0 bg-black/50 z-40 hidden md:hidden"
      id="sidebar-overlay"
      onclick="toggleMobileSidebar()"
    ></div>
    <div class="flex min-h-screen pt-16">
      <!-- NavigationDrawer (Standard Sidebar for Desktop/Tablet) -->
      <aside
        class="fixed md:sticky top-16 left-0 h-[calc(100vh-64px)] z-40 flex flex-col py-lg bg-surface-container dark:bg-inverse-surface w-72 border-r border-outline-variant shadow-lg md:shadow-none shrink-0"
        id="sidebar"
      ></aside>
      <!-- Main Content Canvas -->
      <main
        class="flex-1 pb-20 md:pb-8 px-margin-mobile md:px-margin-desktop min-h-screen transition-all duration-300 pt-8"
        id="main-content"
      >
        <!-- Podium & Performance Section -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-gutter mb-lg">
          <!-- Podium Visual -->
          <div
            class="lg:col-span-1 bg-surface-container-lowest border border-outline-variant rounded-xl p-6 shadow-sm flex flex-col items-center justify-end relative overflow-hidden min-h-[300px]"
          >
            <div class="absolute top-4 left-6">
              <h3 class="font-label-md text-primary uppercase">
                Podio de Honor
              </h3>
            </div>
            <div id="podium-container" class="flex items-end gap-2 w-full max-w-[320px] mt-12">
              <!-- Content will be injected dynamically -->
            </div>
          </div>
          <!-- Dynamic Performance Chart Section -->
          <div
            class="lg:col-span-2 bg-surface-container-lowest border border-outline-variant rounded-xl p-6 shadow-sm overflow-hidden"
          >
            <div
              class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6"
            >
              <h3 class="font-label-md text-on-surface uppercase">
                Rendimiento por Deporte
              </h3>
              <div
                id="chart-filters"
                class="flex gap-2 overflow-x-auto pb-1 w-full sm:w-auto no-scrollbar"
              >
                <button
                  data-filter="Global"
                  class="filter-btn bg-primary text-white px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap"
                >
                  Global
                </button>
                <button
                  data-filter="Fútbol"
                  class="filter-btn bg-surface-variant text-on-surface-variant px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap hover:bg-secondary-container"
                >
                  Fútbol
                </button>
                <button
                  data-filter="Básquet"
                  class="filter-btn bg-surface-variant text-on-surface-variant px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap hover:bg-secondary-container"
                >
                  Básquet
                </button>
                <button
                  data-filter="Voleibol"
                  class="filter-btn bg-surface-variant text-on-surface-variant px-4 py-1.5 rounded-full text-xs font-bold whitespace-nowrap hover:bg-secondary-container"
                >
                  Voleibol
                </button>
              </div>
            </div>
            <div
              id="chart-container"
              class="h-48 w-full flex items-end justify-center relative"
            >
              <canvas id="performanceChart"></canvas>
            </div>
          </div>
        </div>
        <!-- Dashboard Summary Grid -->
        <div id="kpi-container" class="grid grid-cols-2 lg:grid-cols-4 gap-gutter mb-lg">
          <!-- KPIs will be injected dynamically -->
        </div>
        <!-- Main Layout Split -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-lg">
          <!-- Table: Próximos Partidos -->
          <div class="lg:col-span-2">
            <div
              class="bg-surface-container-lowest border border-outline-variant rounded-xl shadow-sm overflow-hidden"
            >
              <div
                class="p-6 border-b border-outline-variant flex justify-between items-center bg-white"
              >
                <h2 class="font-headline-md text-on-surface text-lg">
                  Próximos Partidos
                </h2>
              </div>
              <div class="overflow-x-auto">
                <table class="w-full text-left min-w-[500px]">
                  <thead>
                    <tr
                      class="bg-surface-low border-b border-outline-variant text-on-surface-variant font-label-md uppercase tracking-wider text-[10px]"
                    >
                      <th class="px-6 py-4">Deporte</th>
                      <th class="px-6 py-4">Equipos</th>
                      <th class="px-6 py-4">Fecha/Hora</th>
                      <th class="px-6 py-4">Estado</th>
                    </tr>
                  </thead>
                  <tbody id="matches-tbody" class="divide-y divide-outline-variant">
                    <!-- Matches will be injected dynamically -->
                  </tbody>
                </table>
              </div>
            </div>
          </div>
          <!-- Ranking Summary -->
          <div class="lg:col-span-1">
            <div class="bg-inverse-surface text-white rounded-xl shadow-lg p-6">
              <h2
                class="font-label-md uppercase mb-6 border-b border-white/10 pb-4"
              >
                Ranking de Instituciones
              </h2>
              <div id="ranking-list" class="space-y-4">
                <!-- Ranking will be injected dynamically -->
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
    <!-- BottomNavBar (Mobile Only) -->
    <nav
      class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-16 md:hidden px-4 pb-safe bg-surface dark:bg-inverse-surface border-t border-outline-variant dark:border-outline shadow-[0_-4px_12px_rgba(0,0,0,0.1)]"
    >
      <a
        class="flex flex-col items-center justify-center text-primary dark:text-inverse-primary font-bold"
        href="perfil.html"
      >
        <span class="material-symbols-outlined" data-weight="fill">home</span>
        <span class="font-label-md text-[10px] uppercase">Home</span>
      </a>
      <a
        class="flex flex-col items-center justify-center text-secondary dark:text-secondary-fixed-dim p-2"
        href="perfil.html"
      >
        <span class="material-symbols-outlined">group</span>
        <span class="font-label-md text-[10px] uppercase">Teams</span>
      </a>
      <a
        class="flex flex-col items-center justify-center text-secondary dark:text-secondary-fixed-dim p-2"
        href="perfil.html"
      >
        <span class="material-symbols-outlined">sports_score</span>
        <span class="font-label-md text-[10px] uppercase">Matches</span>
      </a>
      <a
        class="flex flex-col items-center justify-center text-secondary dark:text-secondary-fixed-dim p-2"
        href="perfil.html"
      >
        <span class="material-symbols-outlined">military_tech</span>
        <span class="font-label-md text-[10px] uppercase">Results</span>
      </a>
    </nav>
  </body>
</html>
