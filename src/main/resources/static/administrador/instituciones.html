<html class="light" lang="es">

              "on-error-container": "#93000a",

              "on-secondary-fixed": "#1a1c1c",
              primary: "#ad0017",

              "surface-container-low": "#f6f3f2",

              "tertiary-fixed": "#e2e2e2",

    </script>
    <style>

        font-family: "Lexend", sans-serif;
        overflow-x: hidden;
      }
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }

      /* Sidebar transition and state matching SCREEN_20 */
      #sidebar {
        transition:
          width 0.3s ease,
          transform 0.3s ease;
      }
      .sidebar-collapsed {
        width: 80px !important;
      }
      .sidebar-collapsed .nav-label,
      .sidebar-collapsed .config-text {
        display: none;
      }
      .sidebar-collapsed nav a {
        justify-content: center;
        padding-left: 0;
        padding-right: 0;
      }
      .sidebar-collapsed .material-symbols-outlined {
        margin: 0;
      }

      @media (max-width: 767px) {
        #sidebar {
          transform: translateX(-100%);
          position: fixed;
          width: 288px !important;
        }
        #sidebar.mobile-open {
          transform: translateX(0);
        }
        #main-content {
          margin-left: 0 !important;
        }
      }

      .scroll-hide::-webkit-scrollbar {
        display: none;
      }
    </style>
    <script src="../js/sidebar.js"></script>
    <link rel="stylesheet" href="../css/style.css" />
    <script src="../js/header.js"></script>
    <script src="../js/auth.js"></script>
  </head>
  <body class="admin-theme">
    <!-- TopAppBar -->
    <header></header>
    <!-- Overlay for Mobile Sidebar -->
    <div
      class="fixed inset-0 bg-black/50 z-40 hidden md:hidden"
      id="sidebar-overlay"
      onclick="toggleMobileSidebar()"
    ></div>
    <div class="flex min-h-screen pt-16">
      <!-- NavigationDrawer (Exact structure from SCREEN_20) -->
      <aside
        class="fixed md:sticky top-16 left-0 h-[calc(100vh-64px)] z-40 flex flex-col py-lg bg-surface-container dark:bg-inverse-surface w-72 border-r border-outline-variant shadow-lg md:shadow-none shrink-0"
        id="sidebar"
      ></aside>
      <!-- Main Content -->
      <main
        class="flex-1 pb-20 md:pb-8 px-margin-mobile md:px-margin-desktop min-h-screen transition-all duration-300 pt-8"
        id="main-content"
      >
        <div class="max-w-4xl mx-auto space-y-lg">
          <!-- List Header with Action -->
          <div
            class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between"
          >
            <div class="flex items-center gap-2">
              <h2 class="font-title-lg text-title-lg text-on-surface">
                Instituciones Registradas
              </h2>
              <span
                id="contadorInstituciones"
                class="font-caption text-caption text-on-surface-variant bg-surface-container-high px-2 py-1 rounded"
                >0 Total</span
              >
            </div>
            <button
              onclick="abrirFormularioInstitucion()"
              class="bg-primary text-on-primary font-label-md px-6 py-3 rounded-lg shadow-md hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2 w-full sm:w-auto"
            >
              <span class="material-symbols-outlined text-lg">add</span>
              Nueva institución
            </button>
          </div>
          <!-- Listado de Instituciones -->
          <section id="listaInstituciones" class="space-y-sm"></section>

          <!-- Pagination -->
          <div class="flex justify-between items-center pt-md">
            <p class="text-caption text-on-surface-variant" id="textoPaginacion">
              Mostrando 0 de 0 instituciones
            </p>
            <div class="flex gap-2" id="paginacionControles">
              <!-- Dynamically populated -->
            </div>
          </div>
        </div>
      </main>
    </div>
    <!-- BottomNavBar (Mobile Only) -->
    <nav
      class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-16 md:hidden px-4 pb-safe bg-surface dark:bg-inverse-surface border-t border-outline-variant dark:border-outline shadow-[0_-4px_12px_rgba(0,0,0,0.1)]"
    >
      <a
        class="flex flex-col items-center justify-center text-on-surface-variant dark:text-secondary-fixed-dim p-2"
        href="dashboard.html"
      >
        <span class="material-symbols-outlined">dashboard</span>
        <span class="font-label-md text-[10px] uppercase">Dashboard</span>
      </a>
      <a
        class="flex flex-col items-center justify-center text-on-surface-variant dark:text-secondary-fixed-dim p-2"
        href="eventos.html"
      >
        <span class="material-symbols-outlined">event</span>
        <span class="font-label-md text-[10px] uppercase">Eventos</span> </a
      ><a
        class="flex flex-col items-center justify-center text-primary dark:text-inverse-primary font-bold p-2"
        href="instituciones.html"
      >
        <span
          class="material-symbols-outlined"
          style="font-variation-settings: &quot;FILL&quot; 1"
          >account_balance</span
        >
        <span class="font-label-md text-[10px] uppercase">Instituciones</span>
      </a>
      <a
        class="flex flex-col items-center justify-center text-on-surface-variant dark:text-secondary-fixed-dim p-2"
        href="equipos.html"
      >
        <span class="material-symbols-outlined">group</span>
        <span class="font-label-md text-[10px] uppercase">Equipos</span>
      </a>
      <a
        class="flex flex-col items-center justify-center text-on-surface-variant dark:text-secondary-fixed-dim p-2"
        href="calendario.html"
      >
        <span class="material-symbols-outlined">calendar_month</span>
        <span class="font-label-md text-[10px] uppercase">Calendario</span>
      </a>
      <a
        class="flex flex-col items-center justify-center text-on-surface-variant dark:text-secondary-fixed-dim p-2"
        href="resultados.html"
      >
        <span class="material-symbols-outlined">emoji_events</span>
        <span class="font-label-md text-[10px] uppercase">Resultados</span>
      </a>
    </nav>
    <div
      id="modalInstitucion"
      class="fixed inset-0 bg-black/50 hidden items-center justify-center z-[999]"
    >
      <div class="bg-white rounded-xl p-6 w-full max-w-md shadow-xl">
        <h3 id="tituloModal" class="text-xl font-bold mb-4 text-on-surface">
          Nueva institución
        </h3>

        <input type="hidden" id="institucionId" />

        <div class="space-y-4">
          <input
            id="nombreInstitucion"
            type="text"
            placeholder="Nombre"
            class="w-full border border-outline rounded-lg px-4 py-3"
          />

          <input
            id="direccionInstitucion"
            type="text"
            placeholder="Dirección"
            class="w-full border border-outline rounded-lg px-4 py-3"
          />

          <input
            id="telefonoInstitucion"
            type="text"
            placeholder="Teléfono"
            class="w-full border border-outline rounded-lg px-4 py-3"
          />

          <div class="flex justify-end gap-2 pt-4">
            <button
              onclick="cerrarFormularioInstitucion()"
              class="px-4 py-2 rounded-lg bg-surface-container-high text-on-surface"
            >
              Cancelar
            </button>

            <button
              onclick="guardarInstitucion()"
              class="px-4 py-2 rounded-lg bg-primary text-on-primary"
            >
              Guardar
            </button>
          </div>
        </div>
      </div>
    </div>
    <script>
      const API_BASE = window.location.port === "8081" ? "" : "http://localhost:8081";
      const API_INSTITUCIONES = `${API_BASE}/api/instituciones`;
      let institucionesOriginales = [];
      let paginaActual = 1;
      const itemsPorPagina = 10;

      document.addEventListener("DOMContentLoaded", () => {
        cargarInstituciones();
      });

      function cargarInstituciones() {
        fetch(API_INSTITUCIONES)
          .then((response) => response.json())
          .then((data) => {
            institucionesOriginales = data;
            paginaActual = 1;
            renderizarInstituciones();
          })
          .catch((error) => {
            console.error(error);
            showToast("Error al cargar instituciones", "error");
          });
      }

      function renderizarInstituciones() {
        const lista = document.getElementById("listaInstituciones");
        const contador = document.getElementById("contadorInstituciones");

        lista.innerHTML = "";
        contador.textContent = `${institucionesOriginales.length} Total`;

        const totalItems = institucionesOriginales.length;

        const textoPaginacion = document.getElementById("textoPaginacion");
        const controles = document.getElementById("paginacionControles");

        if (totalItems === 0) {
          lista.innerHTML = `
            <div class="bg-surface-container-low p-8 rounded-xl border border-outline-variant text-center my-4">
              <span class="material-symbols-outlined text-4xl text-on-surface-variant mb-2">account_balance</span>
              <p class="font-body-md text-on-surface-variant">No hay datos disponibles</p>
            </div>
          `;
          if (textoPaginacion) {
            textoPaginacion.textContent = "Mostrando 0 de 0 instituciones";
          }
          if (controles) {
            controles.innerHTML = "";
          }
          return;
        }

        const totalPaginas = Math.ceil(totalItems / itemsPorPagina) || 1;
        if (paginaActual > totalPaginas) paginaActual = totalPaginas;

        const inicio = (paginaActual - 1) * itemsPorPagina;
        const fin = Math.min(inicio + itemsPorPagina, totalItems);
        const itemsPagina = institucionesOriginales.slice(inicio, fin);

        if (textoPaginacion) {
          textoPaginacion.textContent = `Mostrando ${inicio + 1}-${fin} de ${totalItems} instituciones`;
        }

        if (controles) {
          controles.innerHTML = "";

          const btnPrev = document.createElement("button");
          btnPrev.className = "w-10 h-10 flex items-center justify-center rounded-lg border border-outline-variant hover:bg-surface-container transition-colors disabled:opacity-50 disabled:cursor-not-allowed";
          btnPrev.innerHTML = `<span class="material-symbols-outlined">chevron_left</span>`;
          btnPrev.disabled = paginaActual === 1;
          btnPrev.onclick = () => {
            if (paginaActual > 1) {
              paginaActual--;
              renderizarInstituciones();
            }
          };
          controles.appendChild(btnPrev);

          for (let i = 1; i <= totalPaginas; i++) {
            const btnPag = document.createElement("button");
            if (i === paginaActual) {
              btnPag.className = "w-10 h-10 flex items-center justify-center rounded-lg bg-primary text-on-primary font-bold transition-all";
            } else {
              btnPag.className = "w-10 h-10 flex items-center justify-center rounded-lg border border-outline-variant hover:bg-surface-container transition-colors";
            }
            btnPag.textContent = i;
            btnPag.onclick = () => {
              paginaActual = i;
              renderizarInstituciones();
            };
            controles.appendChild(btnPag);
          }

          const btnNext = document.createElement("button");
          btnNext.className = "w-10 h-10 flex items-center justify-center rounded-lg border border-outline-variant hover:bg-surface-container transition-colors disabled:opacity-50 disabled:cursor-not-allowed";
          btnNext.innerHTML = `<span class="material-symbols-outlined">chevron_right</span>`;
          btnNext.disabled = paginaActual === totalPaginas;
          btnNext.onclick = () => {
            if (paginaActual < totalPaginas) {
              paginaActual++;
              renderizarInstituciones();
            }
          };
          controles.appendChild(btnNext);
        }

        itemsPagina.forEach((item) => {
          lista.innerHTML += `
            <div class="bg-surface-container-low p-md rounded-xl border-l-4 border-primary shadow-sm hover:shadow-md transition-shadow">
              <div class="flex justify-between items-center gap-4">
                <div class="flex-1 min-w-0">
                  <h3 class="font-label-md text-label-md text-on-surface truncate" title="${item.nombre}">${item.nombre}</h3>
                  <p class="font-caption text-caption text-on-surface-variant truncate" title="${item.telefono || "Sin teléfono"} • ${item.direccion || "Sin dirección"}">${item.telefono || "Sin teléfono"} • ${item.direccion || "Sin dirección"}</p>
                </div>
                <div class="flex gap-1 md:gap-2 shrink-0">
                  <button onclick='editarInstitucion(${JSON.stringify(item)})'
                    class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-primary-fixed-dim transition-colors">
                    <span class="material-symbols-outlined text-primary">edit</span>
                  </button>
                  <button onclick="eliminarInstitucion(${item.id})"
                    class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-error-container transition-colors">
                    <span class="material-symbols-outlined text-error">delete</span>
                  </button>
                </div>
              </div>
            </div>
          `;
        });
      }

      function abrirFormularioInstitucion() {
        document.getElementById("modalInstitucion").classList.remove("hidden");
        document.getElementById("modalInstitucion").classList.add("flex");
        document.getElementById("tituloModal").textContent =
          "Nueva institución";
        limpiarFormularioInstitucion();
      }

      function cerrarFormularioInstitucion() {
        document.getElementById("modalInstitucion").classList.add("hidden");
        document.getElementById("modalInstitucion").classList.remove("flex");
      }

      function limpiarFormularioInstitucion() {
        document.getElementById("institucionId").value = "";
        document.getElementById("nombreInstitucion").value = "";
        document.getElementById("direccionInstitucion").value = "";
        document.getElementById("telefonoInstitucion").value = "";
      }

      function guardarInstitucion() {
        const id = document.getElementById("institucionId").value;
        const nombre = document
          .getElementById("nombreInstitucion")
          .value.trim();
        const direccion = document
          .getElementById("direccionInstitucion")
          .value.trim();
        const telefono = document
          .getElementById("telefonoInstitucion")
          .value.trim();

        if (!nombre || !direccion || !telefono) {
          showToast("Todos los campos son obligatorios", "warning");
          return;
        }

        if (!/^[0-9]+$/.test(telefono)) {
          showToast("El teléfono debe contener solo números", "warning");
          return;
        }

        const institucion = {
          nombre,
          direccion,
          telefono,
        };

        const url = id ? `${API_INSTITUCIONES}/${id}` : API_INSTITUCIONES;
        const metodo = id ? "PUT" : "POST";

        fetch(url, {
          method: metodo,
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify(institucion),
        })
          .then((response) => {
            if (!response.ok) {
              return response.json().then((err) => {
                throw new Error(err.message || "Error del servidor");
              });
            }
            return response.json();
          })
          .then(() => {
            cerrarFormularioInstitucion();
            cargarInstituciones();
            showToast(
              id
                ? "Institución actualizada correctamente"
                : "Institución registrada correctamente",
              "success"
            );
          })
          .catch((error) => {
            console.error(error);
            showToast("Error al guardar institución: " + error.message, "error");
          });
      }

      function editarInstitucion(item) {
        document.getElementById("modalInstitucion").classList.remove("hidden");
        document.getElementById("modalInstitucion").classList.add("flex");

        document.getElementById("tituloModal").textContent =
          "Editar institución";
        document.getElementById("institucionId").value = item.id;
        document.getElementById("nombreInstitucion").value = item.nombre || "";
        document.getElementById("direccionInstitucion").value =
          item.direccion || "";
        document.getElementById("telefonoInstitucion").value =
          item.telefono || "";
      }

      function eliminarInstitucion(id) {
        showConfirm("¿Seguro que deseas eliminar esta institución?", () => {
          fetch(`${API_INSTITUCIONES}/${id}`, {
            method: "DELETE",
          })
            .then((response) => response.text())
            .then(() => {
              cargarInstituciones();
              showToast("Institución eliminada correctamente", "success");
            })
            .catch((error) => {
              console.error(error);
              showToast("Error al eliminar institución", "error");
            });
        });
      }
    </script>
  </body>
</html>
