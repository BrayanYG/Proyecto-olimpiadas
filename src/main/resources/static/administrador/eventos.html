<!doctype html>

<html class="light" lang="es">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary-fixed-dim": "#ffb3ad",
              "primary-fixed": "#ffdad6",
              "surface-container-lowest": "#ffffff",
              "on-tertiary-container": "#f0f0f0",
              outline: "#926e6b",
              "tertiary-fixed-dim": "#c6c6c7",
              "surface-dim": "#dcd9d9",
              "on-error-container": "#93000a",
              "surface-bright": "#fcf9f8",
              "on-primary": "#ffffff",
              secondary: "#5d5f5f",
              "surface-tint": "#c0001a",
              "surface-container-highest": "#e5e2e1",
              "outline-variant": "#e7bdb9",
              "inverse-primary": "#ffb3ad",
              background: "#fcf9f8",
              "surface-container-high": "#eae7e7",
              "on-primary-fixed-variant": "#930011",
              "secondary-container": "#dfe0e0",
              "on-secondary-fixed-variant": "#454747",
              "primary-container": "#d91023",
              primary: "#ad0017",
              "on-tertiary-fixed-variant": "#454747",
              "on-tertiary-fixed": "#1a1c1c",
              "on-primary-fixed": "#410003",
              "secondary-fixed-dim": "#c6c6c7",
              "on-surface-variant": "#5d3f3c",
              "inverse-surface": "#313030",
              "surface-variant": "#e5e2e1",
              "on-surface": "#1c1b1b",
              "inverse-on-surface": "#f3f0ef",
              "secondary-fixed": "#e2e2e2",
              tertiary: "#535555",
              "on-primary-container": "#ffecea",
              error: "#ba1a1a",
              "tertiary-fixed": "#e2e2e2",
              "on-secondary-container": "#616363",
              "error-container": "#ffdad6",
              "surface-container-low": "#f6f3f2",
              "tertiary-container": "#6c6d6d",
              "on-background": "#1c1b1b",
              "on-tertiary": "#ffffff",
              "on-secondary-fixed": "#1a1c1c",
              surface: "#fcf9f8",
              "surface-container": "#f0eded",
              "on-error": "#ffffff",
              "on-secondary": "#ffffff",
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
            spacing: {
              margin: "32px",
              gutter: "24px",
              sm: "12px",
              xs: "4px",
              md: "24px",
              xl: "64px",
              base: "8px",
              lg: "40px",
            },
            fontFamily: {
              caption: ["Lexend"],
              "body-md": ["Lexend"],
              "display-lg": ["Lexend"],
              "label-md": ["Lexend"],
              "title-lg": ["Lexend"],
              "body-lg": ["Lexend"],
              "headline-xl": ["Lexend"],
              "headline-md": ["Lexend"],
            },
            fontSize: {
              caption: ["12px", { lineHeight: "1.2", fontWeight: "500" }],
              "body-md": ["16px", { lineHeight: "1.5", fontWeight: "400" }],
              "display-lg": [
                "64px",
                {
                  lineHeight: "1.1",
                  letterSpacing: "-0.02em",
                  fontWeight: "800",
                },
              ],
              "label-md": ["14px", { lineHeight: "1.2", fontWeight: "600" }],
              "title-lg": ["20px", { lineHeight: "1.4", fontWeight: "600" }],
              "body-lg": ["18px", { lineHeight: "1.6", fontWeight: "400" }],
              "headline-xl": [
                "48px",
                {
                  lineHeight: "1.2",
                  letterSpacing: "-0.01em",
                  fontWeight: "700",
                },
              ],
              "headline-md": ["32px", { lineHeight: "1.3", fontWeight: "700" }],
            },
          },
        },
      };
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      .textile-pattern {
        background-image:
          radial-gradient(var(--tw-colors-primary) 0.5px, transparent 0.5px),
          radial-gradient(var(--tw-colors-primary) 0.5px, #fcf9f8 0.5px);
        background-size: 20px 20px;
        background-position:
          0 0,
          10px 10px;
        opacity: 0.03;
      }
      #sidebar {
        transition:
          width 0.3s ease,
          transform 0.3s ease;
      }
      .sidebar-collapsed {
        width: 80px !important;
      }
      .sidebar-collapsed .nav-label,
      .sidebar-collapsed .config-text {
        display: none;
      }
      .sidebar-collapsed nav a {
        justify-content: center;
        padding-left: 0;
        padding-right: 0;
      }
      .sidebar-collapsed .material-symbols-outlined {
        margin: 0;
      }

      @media (max-width: 767px) {
        #sidebar {
          transform: translateX(-100%);
          position: fixed;
          height: 100vh;
          top: 0;
          display: flex !important;
        }
        #sidebar.mobile-open {
          transform: translateX(0);
        }
      }

      @media (min-width: 768px) {
        #sidebar {
          transform: none !important;
        }
      }

      .modal-backdrop {
        background-color: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(4px);
      }
    </style>
    <script src="../js/sidebar.js"></script>
    <link rel="stylesheet" href="../css/style.css" />
    <script src="../js/header.js"></script>
    <script src="../js/auth.js"></script>
  </head>
  <body class="admin-theme">
    <!-- TopAppBar -->
    <header></header>
    <div class="flex min-h-screen pt-16">
      <!-- Overlay for mobile menu -->
      <div
        class="fixed inset-0 bg-black/50 z-30 hidden md:hidden"
        id="sidebar-overlay"
        onclick="toggleMobileMenu()"
      ></div>
      <!-- Sidebar Navigation -->
      <aside
        class="md:sticky top-0 md:top-16 left-0 h-screen md:h-[calc(100vh-64px)] z-40 hidden md:flex flex-col py-lg bg-surface-container dark:bg-inverse-surface w-72 border-r border-outline-variant shrink-0"
        id="sidebar"
      ></aside>
      <!-- Main Content Area -->
      <main
        class="flex-1 min-h-screen relative overflow-hidden transition-all duration-300 pt-8"
        id="main-content"
      >
        <div class="textile-pattern absolute inset-0 -z-10"></div>
        <div class="px-margin max-w-[1400px] mx-auto space-y-md">
          <!-- Header Section -->
          <div
            class="flex flex-col md:flex-row justify-between items-start md:items-center mb-xl gap-md"
          >
            <div>
              <h3
                class="font-headline-md text-headline-md text-on-surface font-bold"
              >
                Listado de Competencias
              </h3>
              <p class="font-body-md text-body-md text-secondary">
                Administra y supervisa el calendario oficial de eventos
                nacionales.
              </p>
            </div>
            <button
              class="bg-primary text-on-primary px-lg py-sm rounded-lg font-label-md text-label-md flex items-center gap-sm shadow-md hover:brightness-110 active:scale-95 transition-all"
              onclick="openModal()"
            >
              <span>Crear Nuevo Evento</span>
              <span
                class="material-symbols-outlined"
                style="font-variation-settings: &quot;wght&quot; 700"
                >add</span
              >
            </button>
          </div>
          <!-- Dashboard Table Section -->
          <div
            class="bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant/30 overflow-hidden"
          >
            <div class="overflow-x-auto">
              <table class="w-full border-collapse text-left">
                <thead
                  class="bg-surface-container border-b border-outline-variant"
                >
                  <tr>
                    <th
                      class="px-md py-lg font-label-md text-label-md text-on-surface uppercase tracking-wider"
                    >
                      Nombre del Evento
                    </th>
                    <th
                      class="px-md py-lg font-label-md text-label-md text-on-surface uppercase tracking-wider"
                    >
                      Fecha Inicio
                    </th>
                    <th
                      class="px-md py-lg font-label-md text-label-md text-on-surface uppercase tracking-wider"
                    >
                      Fecha Fin
                    </th>
                    <th
                      class="px-md py-lg font-label-md text-label-md text-on-surface uppercase tracking-wider"
                    >
                      Ubicación
                    </th>
                    <th
                      class="px-md py-lg font-label-md text-label-md text-on-surface uppercase tracking-wider"
                    >
                      Estado
                    </th>
                    <th
                      class="px-md py-lg font-label-md text-label-md text-on-surface uppercase tracking-wider text-right"
                    >
                      Acciones
                    </th>
                  </tr>
                </thead>
                <tbody
                  id="tablaEventos"
                  class="divide-y divide-outline-variant/30"
                ></tbody>
              </table>
            </div>
            <!-- Pagination -->
            <div
              class="px-md py-md bg-surface-container-low border-t border-outline-variant flex justify-between items-center"
            >
              <span id="contadorEventos" class="text-caption text-secondary">
                Mostrando 0 eventos
              </span>
              <div class="flex gap-2" id="paginacionControles">
                <!-- Dynamically populated -->
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
    <!-- Modal: Nuevo Evento -->
    <div class="fixed inset-0 z-[60] hidden" id="modal-container">
      <div class="modal-backdrop absolute inset-0" onclick="closeModal()"></div>
      <div class="flex items-center justify-center min-h-screen p-4">
        <div
          class="bg-surface-container-lowest w-full max-w-lg rounded-2xl shadow-2xl relative overflow-hidden transform transition-all duration-300 scale-95 opacity-0"
          id="modal-content"
        >
          <div class="bg-primary p-6 flex justify-between items-center">
            <h2 class="text-white font-headline-md text-title-lg">
              Registrar Nuevo Evento
            </h2>
            <button
              class="text-white/80 hover:text-white transition-colors"
              onclick="closeModal()"
            >
              <span class="material-symbols-outlined">close</span>
            </button>
          </div>
          <form class="p-6 space-y-gutter" id="newEventForm">
            <div class="space-y-xs">
              <input id="eventoId" type="hidden" />
              <label class="font-label-md text-on-surface-variant block"
                >Nombre del Evento</label
              >
              <div class="space-y-xs">
                <label class="font-label-md text-on-surface-variant block"
                  >Deporte</label
                >
                <select
                  id="deporteEvento"
                  class="w-full px-4 py-3 rounded-lg border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all"
                >
                  <option value="">Seleccione deporte</option>
                </select>
              </div>
              <input
                id="nombreEvento"
                class="w-full px-4 py-3 rounded-lg border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all"
                placeholder="Ej. Copa Nacional de Atletismo"
                required=""
                type="text"
              />
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-gutter">
              <div class="space-y-xs">
                <label class="font-label-md text-on-surface-variant block"
                  >Fecha de Inicio</label
                >
                <input
                  id="fechaInicioEvento"
                  class="w-full px-4 py-3 rounded-lg border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all"
                  required=""
                  type="date"
                />
              </div>
              <div class="space-y-xs">
                <label class="font-label-md text-on-surface-variant block"
                  >Fecha de Fin</label
                >
                <input
                  id="fechaFinEvento"
                  class="w-full px-4 py-3 rounded-lg border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all"
                  required=""
                  type="date"
                />
              </div>
            </div>
            <div class="space-y-xs">
              <label class="font-label-md text-on-surface-variant block"
                >Ubicación</label
              >
              <div class="relative">
                <span
                  class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant"
                  >location_on</span
                >
                <input
                  id="ubicacionEvento"
                  class="w-full pl-10 pr-4 py-3 rounded-lg border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all"
                  placeholder="Ciudad, Sede o Estadio"
                  required=""
                  type="text"
                />
              </div>
            </div>
            <div class="space-y-xs">
              <label class="font-label-md text-on-surface-variant block"
                >Estado</label
              >
              <select
                id="estadoEvento"
                class="w-full px-4 py-3 rounded-lg border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all"
              >
                <option value="">Seleccione estado</option>
                <option value="PENDIENTE">PENDIENTE</option>
                <option value="EN_CURSO">EN_CURSO</option>
                <option value="FINALIZADO">FINALIZADO</option>
              </select>
            </div>
            <div class="flex gap-4 pt-4">
              <button
                class="flex-1 py-3 px-4 border border-outline text-on-surface-variant font-label-md rounded-lg hover:bg-surface-container transition-colors"
                onclick="closeModal()"
                type="button"
              >
                Cancelar
              </button>
              <button
                onclick="guardarEvento()"
                class="flex-1 py-3 px-4 bg-primary text-on-primary font-bold rounded-lg hover:brightness-110 shadow-md transition-all"
                type="button"
              >
                Guardar Evento
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
    <script>
      const API_BASE = window.location.port === "8081" ? "" : "http://localhost:8081";
      const API_EVENTOS = `${API_BASE}/api/eventos`;
      const API_DEPORTES = `${API_BASE}/api/deportes`;

      let eventosOriginales = [];
      let deportesOriginales = [];
      let paginaActual = 1;
      const itemsPorPagina = 10;

      document.addEventListener("DOMContentLoaded", () => {
        cargarDeportes();
        cargarEventos();
      });

      function cargarDeportes() {
        fetch(API_DEPORTES)
          .then((response) => response.json())
          .then((data) => {
            deportesOriginales = data;

            const select = document.getElementById("deporteEvento");
            select.innerHTML = '<option value="">Seleccione deporte</option>';

            data.forEach((deporte) => {
              select.innerHTML += `
          <option value="${deporte.id}">
            ${deporte.nombre}
          </option>
        `;
            });
          })
          .catch((error) => {
            console.error(error);
            showToast("Error al cargar deportes", "error");
          });
      }

      function cargarEventos() {
        fetch(API_EVENTOS)
          .then((response) => response.json())
          .then((data) => {
            eventosOriginales = data;
            paginaActual = 1;
            renderizarEventos();
          })
          .catch((error) => {
            console.error(error);
            showToast("Error al cargar eventos", "error");
          });
      }

      function renderizarEventos() {
        const tabla = document.getElementById("tablaEventos");
        const contador = document.getElementById("contadorEventos");
        const controles = document.getElementById("paginacionControles");
        tabla.innerHTML = "";

        const totalItems = eventosOriginales.length;

        if (totalItems === 0) {
          tabla.innerHTML = `
            <tr>
              <td colspan="6" class="py-8 text-center text-on-surface-variant bg-surface-container-low/30">
                <span class="material-symbols-outlined text-4xl mb-2 text-on-surface-variant block">event</span>
                <p class="font-body-md text-on-surface-variant">No hay datos disponibles</p>
              </td>
            </tr>
          `;
          if (contador) {
            contador.textContent = "Mostrando 0 de 0 eventos";
          }
          if (controles) {
            controles.innerHTML = "";
          }
          return;
        }

        const totalPaginas = Math.ceil(totalItems / itemsPorPagina) || 1;
        if (paginaActual > totalPaginas) paginaActual = totalPaginas;

        const inicio = (paginaActual - 1) * itemsPorPagina;
        const fin = Math.min(inicio + itemsPorPagina, totalItems);
        const itemsPagina = eventosOriginales.slice(inicio, fin);

        if (contador) {
          contador.textContent = `Mostrando ${inicio + 1}-${fin} de ${totalItems} eventos`;
        }

        if (controles) {
          controles.innerHTML = "";
          
          const btnPrev = document.createElement("button");
          btnPrev.className = "w-10 h-10 flex items-center justify-center rounded-lg border border-outline-variant hover:bg-surface-container transition-colors disabled:opacity-50 disabled:cursor-not-allowed";
          btnPrev.innerHTML = `<span class="material-symbols-outlined">chevron_left</span>`;
          btnPrev.disabled = paginaActual === 1;
          btnPrev.onclick = () => {
            if (paginaActual > 1) {
              paginaActual--;
              renderizarEventos();
            }
          };
          controles.appendChild(btnPrev);

          for (let i = 1; i <= totalPaginas; i++) {
            const btnPag = document.createElement("button");
            if (i === paginaActual) {
              btnPag.className = "w-10 h-10 flex items-center justify-center rounded-lg bg-primary text-on-primary font-bold transition-all";
            } else {
              btnPag.className = "w-10 h-10 flex items-center justify-center rounded-lg border border-outline-variant hover:bg-surface-container transition-colors";
            }
            btnPag.textContent = i;
            btnPag.onclick = () => {
              paginaActual = i;
              renderizarEventos();
            };
            controles.appendChild(btnPag);
          }

          const btnNext = document.createElement("button");
          btnNext.className = "w-10 h-10 flex items-center justify-center rounded-lg border border-outline-variant hover:bg-surface-container transition-colors disabled:opacity-50 disabled:cursor-not-allowed";
          btnNext.innerHTML = `<span class="material-symbols-outlined">chevron_right</span>`;
          btnNext.disabled = paginaActual === totalPaginas;
          btnNext.onclick = () => {
            if (paginaActual < totalPaginas) {
              paginaActual++;
              renderizarEventos();
            }
          };
          controles.appendChild(btnNext);
        }

        function formatearFecha(fecha) {
          if (!fecha) return "";

          const partes = fecha.split("-");

          return `${partes[2]}/${partes[1]}/${partes[0]}`;
        }
        
        itemsPagina.forEach((item) => {
          tabla.innerHTML += `
      <tr class="hover:bg-surface-container-low transition-colors group">
        <td class="px-md py-lg">
          <span class="font-bold text-on-surface">${item.nombre}</span>
          <p class="text-xs text-secondary">${item.deporte?.nombre || "Sin deporte"}</p>
        </td>

        <td class="px-md py-lg text-secondary font-body-md whitespace-nowrap">
          ${formatearFecha(item.fechaInicio)}
        </td>

        <td class="px-md py-lg text-secondary font-body-md whitespace-nowrap">
          ${formatearFecha(item.fechaFin)}
        </td>

        <td class="px-md py-lg">
          <div class="flex items-center gap-xs text-secondary font-body-md">
            <span class="material-symbols-outlined text-sm">location_on</span>
            <span>${item.ubicacion || "Sin ubicación"}</span>
          </div>
        </td>

        <td class="px-md py-lg">
          <span class="px-2 py-1 bg-blue-100 text-blue-800 text-caption font-bold rounded-full border border-blue-200">
            ${item.estado || "PENDIENTE"}
          </span>
        </td>

        <td class="px-md py-lg text-right">
          <div class="flex justify-end gap-sm">
            <button onclick='editarEvento(${JSON.stringify(item)})'
              class="p-2 text-primary hover:bg-primary/10 rounded-full transition-colors">
              <span class="material-symbols-outlined">edit</span>
            </button>

            <button onclick="eliminarEvento(${item.id})"
              class="p-2 text-error hover:bg-error/10 rounded-full transition-colors">
              <span class="material-symbols-outlined">delete</span>
            </button>
          </div>
        </td>
      </tr>
    `;
        });
      }

      function guardarEvento() {
        const id = document.getElementById("eventoId").value;
        const nombre = document.getElementById("nombreEvento").value.trim();
        const fechaInicio = document.getElementById("fechaInicioEvento").value;
        const fechaFin = document.getElementById("fechaFinEvento").value;
        const ubicacion = document
          .getElementById("ubicacionEvento")
          .value.trim();
        const estado = document.getElementById("estadoEvento").value;
        const deporteId = document.getElementById("deporteEvento").value;

        if (
          !nombre ||
          !fechaInicio ||
          !fechaFin ||
          !ubicacion ||
          !estado ||
          !deporteId
        ) {
          showToast("Todos los campos son obligatorios", "warning");
          return;
        }

        if (fechaFin < fechaInicio) {
          showToast("La fecha fin no puede ser menor que la fecha inicio", "warning");
          return;
        }

        const evento = {
          nombre,
          fechaInicio,
          fechaFin,
          ubicacion,
          estado,
          deporte: {
            id: parseInt(deporteId),
          },
        };

        const url = id ? `${API_EVENTOS}/${id}` : API_EVENTOS;
        const metodo = id ? "PUT" : "POST";

        fetch(url, {
          method: metodo,
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify(evento),
        })
          .then((response) => {
            if (!response.ok) {
              return response.json().then((err) => {
                throw new Error(err.message || "Error del servidor");
              });
            }
            return response.json();
          })
          .then(() => {
            closeModal();
            limpiarFormularioEvento();
            cargarEventos();
            showToast(
              id
                ? "Evento actualizado correctamente"
                : "Evento registrado correctamente",
              "success"
            );
          })
          .catch((error) => {
            console.error(error);
            showToast("Error al guardar evento: " + error.message, "error");
          });
      }

      function editarEvento(item) {
        document.getElementById("eventoId").value = item.id;
        document.getElementById("nombreEvento").value = item.nombre || "";
        document.getElementById("fechaInicioEvento").value =
          item.fechaInicio || "";
        document.getElementById("fechaFinEvento").value = item.fechaFin || "";
        document.getElementById("ubicacionEvento").value = item.ubicacion || "";
        document.getElementById("estadoEvento").value = item.estado || "";
        document.getElementById("deporteEvento").value = item.deporte?.id || "";

        openModal(false);
      }

      function eliminarEvento(id) {
        showConfirm("¿Seguro que deseas eliminar este evento?", () => {
          fetch(`${API_EVENTOS}/${id}`, {
            method: "DELETE",
          })
            .then(() => {
              cargarEventos();
              showToast("Evento eliminado correctamente", "success");
            })
            .catch((error) => {
              console.error(error);
              showToast("Error al eliminar evento", "error");
            });
        });
      }

      function limpiarFormularioEvento() {
        document.getElementById("eventoId").value = "";
        document.getElementById("nombreEvento").value = "";
        document.getElementById("fechaInicioEvento").value = "";
        document.getElementById("fechaFinEvento").value = "";
        document.getElementById("ubicacionEvento").value = "";
        document.getElementById("estadoEvento").value = "";
        document.getElementById("deporteEvento").value = "";
      }

      function openModal(limpiar = true) {
        const modal = document.getElementById("modal-container");
        const content = document.getElementById("modal-content");

        if (limpiar) {
          limpiarFormularioEvento();
        }

        modal.classList.remove("hidden");

        setTimeout(() => {
          content.classList.remove("scale-95", "opacity-0");
          content.classList.add("scale-100", "opacity-100");
        }, 10);
      }

      function closeModal() {
        const modal = document.getElementById("modal-container");
        const content = document.getElementById("modal-content");

        content.classList.add("scale-95", "opacity-0");
        content.classList.remove("scale-100", "opacity-100");

        setTimeout(() => {
          modal.classList.add("hidden");
        }, 200);
      }
    </script>
  </body>
</html>
