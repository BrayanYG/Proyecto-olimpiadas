      id="modalEquipo"
      class="fixed inset-0 bg-black/50 hidden items-center justify-center z-[999]"
    >

          id="tituloModalEquipo"

          Registrar equipo

        <input type="hidden" id="equipoId" />

    <script>
      const API_BASE = window.location.port === "8081" ? "" : "http://localhost:8081";
      const API_EQUIPOS = `${API_BASE}/api/equipos`;
      const API_INSTITUCIONES = `${API_BASE}/api/instituciones`;
      const API_DEPORTES = `${API_BASE}/api/deportes`;

      let equiposOriginales = [];
      let equiposFiltrados = [];
      let paginaActual = 1;
      const itemsPorPagina = 10;
      let institucionesOriginales = [];
      let deportesOriginales = [];

      document.addEventListener("DOMContentLoaded", () => {
        cargarDeportes();
        cargarEquipos();
      });

      function cargarDeportes() {
        fetch(API_DEPORTES)
          .then((response) => response.json())
          .then((data) => {
            deportesOriginales = data;

            const selectModal = document.getElementById("deporteEquipo");
            const selectFiltro = document.getElementById("filtroDeporte");

            selectModal.innerHTML =
              '<option value="">Seleccione deporte</option>';
            selectFiltro.innerHTML =
              '<option value="">Todos los deportes</option>';

            data.forEach((item) => {
              selectModal.innerHTML += `<option value="${item.id}">${item.nombre}</option>`;
              selectFiltro.innerHTML += `<option value="${item.id}">${item.nombre}</option>`;
            });
          });
      }

      function cargarEquipos() {
        fetch(API_EQUIPOS)
          .then((response) => response.json())
          .then((data) => {
            equiposOriginales = data;
            equiposFiltrados = data;
            paginaActual = 1;
            renderizarEquipos();
          })
          .catch((error) => {
            console.error(error);
            showToast("Error al cargar equipos", "error");
          });
      }

      function renderizarEquipos() {
        const tabla = document.getElementById("tablaEquipos");
        const mobileContainer = document.getElementById("listaEquiposMobile");
        const contador = document.getElementById("contadorEquipos");

        tabla.innerHTML = "";
        if (mobileContainer) mobileContainer.innerHTML = "";
        contador.textContent = `${equiposFiltrados.length} Total`;

        const totalItems = equiposFiltrados.length;
        const textoPaginacion = document.getElementById("textoPaginacion");
        const controles = document.getElementById("paginacionControles");

        if (totalItems === 0) {
          tabla.innerHTML = `
            <tr>
              <td colspan="5" class="py-8 text-center text-on-surface-variant bg-surface-container-low/30">
                <span class="material-symbols-outlined text-4xl mb-2 text-on-surface-variant block">group</span>
                <p class="font-body-md text-on-surface-variant">No hay datos disponibles</p>
              </td>
            </tr>
          `;
          if (mobileContainer) {
            mobileContainer.innerHTML = `
              <div class="bg-surface-container-low p-8 rounded-xl border border-outline-variant text-center my-4">
                <span class="material-symbols-outlined text-4xl text-on-surface-variant mb-2">group</span>
                <p class="font-body-md text-on-surface-variant">No hay datos disponibles</p>
              </div>
            `;
          }
          if (textoPaginacion) {
            textoPaginacion.textContent = "Mostrando 0 de 0 equipos";
          }
          if (controles) {
            controles.innerHTML = "";
          }
          return;
        }

        const totalPaginas = Math.ceil(totalItems / itemsPorPagina) || 1;
        if (paginaActual > totalPaginas) paginaActual = totalPaginas;

        const inicio = (paginaActual - 1) * itemsPorPagina;
        const fin = Math.min(inicio + itemsPorPagina, totalItems);
        const itemsPagina = equiposFiltrados.slice(inicio, fin);

        if (textoPaginacion) {
          textoPaginacion.textContent = `Mostrando ${inicio + 1}-${fin} de ${totalItems} equipos`;
        }

        if (controles) {
          controles.innerHTML = "";

          const btnPrev = document.createElement("button");
          btnPrev.className = "w-10 h-10 flex items-center justify-center rounded-lg border border-outline-variant hover:bg-surface-container transition-colors disabled:opacity-50 disabled:cursor-not-allowed";
          btnPrev.innerHTML = `<span class="material-symbols-outlined">chevron_left</span>`;
          btnPrev.disabled = paginaActual === 1;
          btnPrev.onclick = () => {
            if (paginaActual > 1) {
              paginaActual--;
              renderizarEquipos();
            }
          };
          controles.appendChild(btnPrev);

          for (let i = 1; i <= totalPaginas; i++) {
            const btnPag = document.createElement("button");
            if (i === paginaActual) {
              btnPag.className = "w-10 h-10 flex items-center justify-center rounded-lg bg-primary text-on-primary font-bold transition-all";
            } else {
              btnPag.className = "w-10 h-10 flex items-center justify-center rounded-lg border border-outline-variant hover:bg-surface-container transition-colors";
            }
            btnPag.textContent = i;
            btnPag.onclick = () => {
              paginaActual = i;
              renderizarEquipos();
            };
            controles.appendChild(btnPag);
          }

          const btnNext = document.createElement("button");
          btnNext.className = "w-10 h-10 flex items-center justify-center rounded-lg border border-outline-variant hover:bg-surface-container transition-colors disabled:opacity-50 disabled:cursor-not-allowed";
          btnNext.innerHTML = `<span class="material-symbols-outlined">chevron_right</span>`;
          btnNext.disabled = paginaActual === totalPaginas;
          btnNext.onclick = () => {
            if (paginaActual < totalPaginas) {
              paginaActual++;
              renderizarEquipos();
            }
          };
          controles.appendChild(btnNext);
        }

        itemsPagina.forEach((item) => {
          tabla.innerHTML += `
      <tr class="hover:bg-surface-container-low transition-colors">
        <td class="py-4 px-6 font-bold text-on-surface">${item.nombre}</td>



       <td class="py-4 px-6">
        <span class="px-2 py-1 bg-secondary-container text-on-secondary-container text-xs rounded-full font-bold uppercase">
        ${item.deporte?.nombre || "Sin deporte"}
        </span>
       </td>

<td class="py-4 px-6 text-center text-on-surface">
  ${item.categoria || "Sin categoría"}
</td>

<td class="py-4 px-6 text-right space-x-1">
          <button onclick='editarEquipo(${JSON.stringify(item)})'
            class="p-2 text-primary hover:bg-primary/10 rounded-full transition-colors">
            <span class="material-symbols-outlined">edit</span>
          </button>

          <button onclick="eliminarEquipo(${item.id})"
            class="p-2 text-error hover:bg-error/10 rounded-full transition-colors">
            <span class="material-symbols-outlined">delete</span>
          </button>
        </td>
      </tr>
    `;

          if (mobileContainer) {
            mobileContainer.innerHTML += `
              <div class="bg-surface-container-low p-md rounded-xl border-l-4 border-primary shadow-sm hover:shadow-md transition-shadow">
                <div class="flex justify-between items-center gap-4">
                  <div class="flex-1 min-w-0">
                    <h3 class="font-label-md text-label-md text-on-surface truncate" title="${item.nombre}">${item.nombre}</h3>
                    <p class="font-caption text-caption text-on-surface-variant truncate" title="${item.deporte?.nombre || "Sin deporte"}">${item.deporte?.nombre || "Sin deporte"}</p>
                    <p class="font-caption text-caption text-primary font-bold mt-1 truncate">${item.categoria || "Sin categoría"}</p>
                  </div>
                  <div class="flex gap-1 shrink-0">
                    <button onclick='editarEquipo(${JSON.stringify(item)})'
                      class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-primary-fixed-dim transition-colors shrink-0">
                      <span class="material-symbols-outlined text-primary">edit</span>
                    </button>
                    <button onclick="eliminarEquipo(${item.id})"
                      class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-error-container transition-colors shrink-0">
                      <span class="material-symbols-outlined text-error">delete</span>
                    </button>
                  </div>
                </div>
              </div>
            `;
          }
        });
      }

      function abrirModalEquipo() {
        limpiarFormularioEquipo();
        document.getElementById("tituloModalEquipo").textContent =
          "Registrar equipo";
        document.getElementById("modalEquipo").classList.remove("hidden");
        document.getElementById("modalEquipo").classList.add("flex");
      }

      function cerrarModalEquipo() {
        document.getElementById("modalEquipo").classList.add("hidden");
        document.getElementById("modalEquipo").classList.remove("flex");
      }

      function limpiarFormularioEquipo() {
        document.getElementById("equipoId").value = "";
        document.getElementById("nombreEquipo").value = "";
        document.getElementById("categoriaEquipo").value = "";
        document.getElementById("deporteEquipo").value = "";
      }

      function guardarEquipo() {
        const id = document.getElementById("equipoId").value;
        const nombre = document.getElementById("nombreEquipo").value.trim();
        const categoria = document
          .getElementById("categoriaEquipo")
          .value.trim();
        const deporteId = document.getElementById("deporteEquipo").value;

        if (!nombre || !categoria || !deporteId) {
          showToast("Todos los campos son obligatorios", "warning");
          return;
        }

        const equipo = {
          nombre,
          categoria,
          deporte: {
            id: parseInt(deporteId),
          },
        };

        const url = id ? `${API_EQUIPOS}/${id}` : API_EQUIPOS;
        const metodo = id ? "PUT" : "POST";

        fetch(url, {
          method: metodo,
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify(equipo),
        })
          .then((response) => {
            if (!response.ok) {
              return response.json().then((err) => {
                throw new Error(err.message || "Error del servidor");
              });
            }
            return response.json();
          })
          .then(() => {
            cerrarModalEquipo();
            cargarEquipos();
            showToast(
              id
                ? "Equipo actualizado correctamente"
                : "Equipo registrado correctamente",
              "success"
            );
          })
          .catch((error) => {
            console.error(error);
            showToast("Error al guardar equipo: " + error.message, "error");
          });
      }

      function editarEquipo(item) {
        document.getElementById("equipoId").value = item.id;
        document.getElementById("nombreEquipo").value = item.nombre || "";
        document.getElementById("categoriaEquipo").value = item.categoria || "";
        document.getElementById("deporteEquipo").value = item.deporte?.id || "";
        document.getElementById("tituloModalEquipo").textContent =
          "Editar equipo";

        document.getElementById("modalEquipo").classList.remove("hidden");
        document.getElementById("modalEquipo").classList.add("flex");
      }

      function eliminarEquipo(id) {
        showConfirm("¿Seguro que deseas eliminar este equipo?", () => {
          fetch(`${API_EQUIPOS}/${id}`, {
            method: "DELETE",
          })
            .then((response) => response.text())
            .then(() => {
              cargarEquipos();
              showToast("Equipo eliminado correctamente", "success");
            })
            .catch((error) => {
              console.error(error);
              showToast("Error al eliminar equipo", "error");
            });
        });
      }

      function filtrarEquipos() {
        const texto = document
          .getElementById("buscarEquipo")
          .value.toLowerCase();
        const deporteId = document.getElementById("filtroDeporte").value;

        equiposFiltrados = equiposOriginales.filter((item) => {
          const nombre = item.nombre ? item.nombre.toLowerCase() : "";
          const coincideNombre = nombre.includes(texto);

          const coincideDeporte = !deporteId || item.deporte?.id == deporteId;

          return coincideNombre && coincideDeporte;
        });

        paginaActual = 1;
        renderizarEquipos();
      }
    </script>
  </body>
</html>
