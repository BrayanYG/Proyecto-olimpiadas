    <script>
      const API_BASE = window.location.port === "8081" ? "" : "http://localhost:8081";
      const API_DEPORTES = `${API_BASE}/api/deportes`;
      let deportesOriginales = [];
      let deportesFiltrados = [];
      let paginaActual = 1;
      const itemsPorPagina = 10;
      document.addEventListener("DOMContentLoaded", () => {
        cargarDeportes();
      });

      function cargarDeportes() {
        fetch(API_DEPORTES)
          .then((response) => response.json())
          .then((data) => {
            deportesOriginales = data;
            deportesFiltrados = data;
            paginaActual = 1;
            renderizarDeportes();
          })
          .catch((error) => {
            console.error(error);
            showToast("Error al cargar deportes", "error");
          });
      }

      function abrirModalDeporte() {
        limpiarModalDeporte();

        document.getElementById("new-sport-modal").classList.remove("hidden");
      }

      function cerrarModalDeporte() {
        document.getElementById("new-sport-modal").classList.add("hidden");
      }

      function limpiarModalDeporte() {
        document.getElementById("deporteId").value = "";
        document.getElementById("nombreDeporte").value = "";
        document.getElementById("tipoDeporte").value = "";
        document.getElementById("maxParticipantesDeporte").value = "";
        document.getElementById("reglasDeporte").value = "";
      }

      function guardarDeporte() {
        const id = document.getElementById("deporteId").value;

        const nombre = document.getElementById("nombreDeporte").value.trim();

        const tipo = document.getElementById("tipoDeporte").value;

        const maxParticipantes = document.getElementById(
          "maxParticipantesDeporte",
        ).value;

        const reglas = document.getElementById("reglasDeporte").value.trim();

        if (!nombre || !tipo || !maxParticipantes || !reglas) {
          showToast("Todos los campos son obligatorios", "warning");
          return;
        }

        const deporte = {
          nombre,
          tipo,
          reglas,
          maxParticipantes: parseInt(maxParticipantes),
        };

        const url = id ? `${API_DEPORTES}/${id}` : API_DEPORTES;

        const metodo = id ? "PUT" : "POST";

        fetch(url, {
          method: metodo,

          headers: {
            "Content-Type": "application/json",
          },

          body: JSON.stringify(deporte),
        })
          .then((response) => {
            if (!response.ok) {
              return response.json().then((err) => {
                throw new Error(err.message || "Error del servidor");
              });
            }
            return response.json();
          })

          .then(() => {
            cerrarModalDeporte();

            cargarDeportes();

            showToast(
              id
                ? "Deporte actualizado correctamente"
                : "Deporte registrado correctamente",
              "success"
            );
          })

          .catch((error) => {
            console.error(error);

            showToast("Error al guardar deporte: " + error.message, "error");
          });
      }

      function editarDeporte(item) {
        document.getElementById("deporteId").value = item.id;

        document.getElementById("nombreDeporte").value = item.nombre || "";

        document.getElementById("tipoDeporte").value = item.tipo || "";

        document.getElementById("maxParticipantesDeporte").value =
          item.maxParticipantes || "";

        document.getElementById("reglasDeporte").value = item.reglas || "";

        document.getElementById("new-sport-modal").classList.remove("hidden");
      }

      function eliminarDeporte(id) {
        showConfirm("¿Seguro que deseas eliminar este deporte?", () => {
          fetch(`${API_DEPORTES}/${id}`, {
            method: "DELETE",
          })
            .then(() => {
              cargarDeportes();
              showToast("Deporte eliminado correctamente", "success");
            })
            .catch((error) => {
              console.error(error);
              showToast("Error al eliminar deporte", "error");
            });
        });
      }
      function filtrarDeportes() {
        const texto = document
          .getElementById("buscarDeporte")
          .value.toLowerCase();
        const tipo = document.getElementById("filtroTipo").value;

        deportesFiltrados = deportesOriginales.filter((item) => {
          const nombre = item.nombre ? item.nombre.toLowerCase() : "";
          const coincideNombre = nombre.includes(texto);

          const coincideTipo = !tipo || item.tipo === tipo;

          return coincideNombre && coincideTipo;
        });

        paginaActual = 1;
        renderizarDeportes();
      }
      function renderizarDeportes() {
        const tabla = document.getElementById("tablaDeportes");
        const contador = document.getElementById("contadorDeportes");

        tabla.innerHTML = "";
        contador.textContent = `${deportesFiltrados.length} Total`;

        const totalItems = deportesFiltrados.length;
        const textoPaginacion = document.getElementById("textoPaginacion");
        const controles = document.getElementById("paginacionControles");

        if (totalItems === 0) {
          tabla.innerHTML = `
            <tr>
              <td colspan="4" class="py-8 text-center text-on-surface-variant bg-surface-container-low/30">
                <span class="material-symbols-outlined text-4xl mb-2 text-on-surface-variant block">sports_kabaddi</span>
                <p class="font-body-md text-on-surface-variant">No hay datos disponibles</p>
              </td>
            </tr>
          `;
          if (textoPaginacion) {
            textoPaginacion.textContent = "Mostrando 0 de 0 deportes";
          }
          if (controles) {
            controles.innerHTML = "";
          }
          return;
        }

        const totalPaginas = Math.ceil(totalItems / itemsPorPagina) || 1;
        if (paginaActual > totalPaginas) paginaActual = totalPaginas;

        const inicio = (paginaActual - 1) * itemsPorPagina;
        const fin = Math.min(inicio + itemsPorPagina, totalItems);
        const itemsPagina = deportesFiltrados.slice(inicio, fin);

        if (textoPaginacion) {
          textoPaginacion.textContent = `Mostrando ${inicio + 1}-${fin} de ${totalItems} deportes`;
        }

        if (controles) {
          controles.innerHTML = "";
          
          const btnPrev = document.createElement("button");
          btnPrev.className = "w-10 h-10 flex items-center justify-center rounded-lg border border-outline-variant hover:bg-surface-container transition-colors disabled:opacity-50 disabled:cursor-not-allowed";
          btnPrev.innerHTML = `<span class="material-symbols-outlined">chevron_left</span>`;
          btnPrev.disabled = paginaActual === 1;
          btnPrev.onclick = () => {
            if (paginaActual > 1) {
              paginaActual--;
              renderizarDeportes();
            }
          };
          controles.appendChild(btnPrev);

          for (let i = 1; i <= totalPaginas; i++) {
            const btnPag = document.createElement("button");
            if (i === paginaActual) {
              btnPag.className = "w-10 h-10 flex items-center justify-center rounded-lg bg-primary text-on-primary font-bold transition-all";
            } else {
              btnPag.className = "w-10 h-10 flex items-center justify-center rounded-lg border border-outline-variant hover:bg-surface-container transition-colors";
            }
            btnPag.textContent = i;
            btnPag.onclick = () => {
              paginaActual = i;
              renderizarDeportes();
            };
            controles.appendChild(btnPag);
          }

          const btnNext = document.createElement("button");
          btnNext.className = "w-10 h-10 flex items-center justify-center rounded-lg border border-outline-variant hover:bg-surface-container transition-colors disabled:opacity-50 disabled:cursor-not-allowed";
          btnNext.innerHTML = `<span class="material-symbols-outlined">chevron_right</span>`;
          btnNext.disabled = paginaActual === totalPaginas;
          btnNext.onclick = () => {
            if (paginaActual < totalPaginas) {
              paginaActual++;
              renderizarDeportes();
            }
          };
          controles.appendChild(btnNext);
        }

        itemsPagina.forEach((item) => {
          tabla.innerHTML += `
      <tr class="hover:bg-surface-container-low transition-colors">

        <td class="py-4 px-6">
          <div class="flex items-center gap-sm">
            <span class="font-bold text-on-surface">${item.nombre}</span>
          </div>

          <p class="text-xs text-on-surface-variant mt-1">
            ${item.reglas || ""}
          </p>
        </td>

        <td class="py-4 px-6">

          <span class="px-2 py-1 bg-secondary-container text-on-secondary-container text-xs rounded-full font-bold uppercase">
            ${item.tipo}
          </span>

        </td>

        <td class="py-4 px-6">

          <span class="font-bold text-on-surface">
            ${item.maxParticipantes}
          </span>

        </td>

        <td class="py-4 px-6 text-right space-x-1">

          <button
            onclick='editarDeporte(${JSON.stringify(item)})'
            class="p-2 text-primary hover:bg-primary/10 rounded-full transition-colors">

            <span class="material-symbols-outlined">
              edit
            </span>

          </button>

          <button
            onclick="eliminarDeporte(${item.id})"
            class="p-2 text-error hover:bg-error/10 rounded-full transition-colors">

            <span class="material-symbols-outlined">
              delete
            </span>

          </button>

        </td>

      </tr>
    `;
        });
      }
    </script>
  </body>
</html>
