    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
        display: inline-block;
        line-height: 1;
        text-transform: none;
        letter-spacing: normal;
        word-wrap: normal;
        white-space: nowrap;
        direction: ltr;
      }
      .bg-stadium-overlay {
        background:
          linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.85)),
          url("https://lh3.googleusercontent.com/aida-public/AB6AXuBD-rUTJTIxndstim165DFfViIp7-24UWQ3kuS2l2k9qUk6a5Rf9dautS78oP4OjjDPXmLhMhWXhGIx-YgAULRZBPsIubuJ4Vwej187_ZpCZpdcBfwIAEV8rUPBB9APxoCNfalqh0Y7E5aeqfQf-hGKgSUp2swKKLtTep3LT3-of-9jHVbqBDhzvysczHKkVFTBv9NbeeGlLeaQx-oNGrEMMVwzv7autFWXzxswE2qwgYEEOtmIqKrRhejsvDq6XTJcg3xUkiT-QcQ");
        background-size: cover;
        background-position: center;
      }
      .textile-pattern {
        mask-image: radial-gradient(circle at center, black, transparent);
        opacity: 0.05;
        background-image: repeating-conic-gradient(
          #ad0017 0% 25%,
          transparent 0% 50%
        );
        background-size: 20px 20px;
      }
    </style>
  </head>
  <body
    class="bg-background text-on-background min-h-screen font-body-md flex flex-col h-screen justify-center items-center"
  >
    <!-- Hero Background Wrapper -->
    <div class="fixed inset-0 bg-stadium-overlay -z-10"></div>
    <div class="fixed inset-0 textile-pattern -z-10"></div>
    <!-- Top Navigation Bar (Shared Component Strategy) -->

    <main class="flex items-center justify-center px-gutter">
      <div class="w-full max-w-lg">
        <!-- 2FA Container -->
        <div
          class="bg-surface p-margin rounded-xl shadow-lg border-t-4 border-primary relative overflow-hidden"
        >
          <!-- Branding Accent -->

          <div class="relative z-10">
            <h1 class="font-headline-md text-headline-md text-on-surface mb-xs">
              Verificación de Identidad
            </h1>
            <p class="font-body-md text-body-md text-on-surface-variant mb-lg">
              Ingresa el código de 6 dígitos enviado a tu dispositivo.
            </p>
            <form id="mfa-form" class="space-y-lg">
              <!-- 6-Digit Code Inputs -->
              <div class="flex justify-between gap-sm">
                <input
                  class="mfa-input w-12 h-14 text-center font-headline-md text-headline-md border border-outline-variant rounded-lg bg-surface-container-low focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all"
                  maxlength="1"
                  type="text"
                  placeholder="·"
                />
                <input
                  class="mfa-input w-12 h-14 text-center font-headline-md text-headline-md border border-outline-variant rounded-lg bg-surface-container-low focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all"
                  maxlength="1"
                  type="text"
                  placeholder="·"
                />
                <input
                  class="mfa-input w-12 h-14 text-center font-headline-md text-headline-md border border-outline-variant rounded-lg bg-surface-container-low focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all"
                  maxlength="1"
                  placeholder="·"
                  type="text"
                />
                <input
                  class="mfa-input w-12 h-14 text-center font-headline-md text-headline-md border border-outline-variant rounded-lg bg-surface-container-low focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all"
                  maxlength="1"
                  placeholder="·"
                  type="text"
                />
                <input
                  class="mfa-input w-12 h-14 text-center font-headline-md text-headline-md border border-outline-variant rounded-lg bg-surface-container-low focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all"
                  maxlength="1"
                  placeholder="·"
                  type="text"
                />
                <input
                  class="mfa-input w-12 h-14 text-center font-headline-md text-headline-md border border-outline-variant rounded-lg bg-surface-container-low focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all"
                  maxlength="1"
                  placeholder="·"
                  type="text"
                />
              </div>
              <!-- Verify Button -->
              <button
                id="verify-submit-btn"
                class="w-full bg-primary text-on-primary font-label-md text-label-md py-md rounded-lg uppercase tracking-widest hover:bg-primary-container transition-colors shadow-md active:scale-[0.98] transition-transform flex items-center justify-center disabled:opacity-70 disabled:cursor-not-allowed"
                type="submit"
              >
                Verificar Código
              </button>
            </form>
          </div>
        </div>
      </div>
    </main>
    <!-- Footer Identity -->

    <!-- Bottom Navigation (Shared Component Hidden on Transactional Task-Focused Screen as per mandate) -->
    <!-- Navigation suppressed to prioritize 2FA canvas -->

    <!-- Custom Alert Modal -->
    <div
      class="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-black/50 hidden transition-opacity duration-300 opacity-0"
      id="custom-alert-modal"
    >
      <div
        class="bg-surface w-full max-w-sm rounded-xl shadow-2xl overflow-hidden transform transition-transform duration-300 scale-95 flex flex-col items-center p-lg text-center"
        id="custom-alert-content"
      >
        <span
          class="material-symbols-outlined text-[48px] mb-sm"
          id="custom-alert-icon"
        ></span>
        <h3
          class="font-headline-md text-title-lg mb-xs text-on-surface"
          id="custom-alert-title"
        >
          Mensaje
        </h3>
        <p
          class="font-body-md text-on-surface-variant mb-md"
          id="custom-alert-message"
        >
          Aquí va el mensaje.
        </p>
        <button
          class="w-full bg-primary-container text-on-primary-container font-label-md py-sm rounded-lg hover:opacity-90 active:scale-95 transition-all"
          onclick="closeCustomAlert()"
        >
          Aceptar
        </button>
      </div>
    </div>

    <script>
      const API_BASE = window.location.port === "8081" ? "" : "http://localhost:8081";
      document.addEventListener("DOMContentLoaded", () => {
        const customAlertModal = document.getElementById("custom-alert-modal");
        const customAlertContent = document.getElementById(
          "custom-alert-content",
        );

        window.showCustomAlert = (title, message, isError = false) => {
          document.getElementById("custom-alert-title").innerText = title;
          document.getElementById("custom-alert-message").innerText = message;

          const icon = document.getElementById("custom-alert-icon");
          if (isError) {
            icon.innerText = "error";
            icon.classList.add("text-error");
            icon.classList.remove("text-primary");
          } else {
            icon.innerText = "check_circle";
            icon.classList.add("text-primary");
            icon.classList.remove("text-error");
          }

          customAlertModal.classList.remove("hidden");
          setTimeout(() => {
            customAlertModal.classList.remove("opacity-0");
            customAlertContent.classList.remove("scale-95");
          }, 10);
        };

        window.closeCustomAlert = () => {
          customAlertModal.classList.add("opacity-0");
          customAlertContent.classList.add("scale-95");
          setTimeout(() => customAlertModal.classList.add("hidden"), 300);
        };

        const username = localStorage.getItem("temp_username");
        if (!username) {
          window.location.href = "index.html";
        }

        const inputs = document.querySelectorAll(".mfa-input");
        inputs.forEach((input, index) => {
          input.addEventListener("input", (e) => {
            if (e.target.value.length === 1 && index < inputs.length - 1) {
              inputs[index + 1].focus();
            }
          });
          input.addEventListener("keydown", (e) => {
            if (e.key === "Backspace" && !e.target.value && index > 0) {
              inputs[index - 1].focus();
            }
          });
        });

        const form = document.getElementById("mfa-form");
        const verifySubmitBtn = document.getElementById("verify-submit-btn");

        form.addEventListener("submit", async (e) => {
          e.preventDefault();
          const code = Array.from(inputs)
            .map((input) => input.value)
            .join("");
          if (code.length !== 6) {
            showCustomAlert(
              "Código incompleto",
              "Por favor, ingresa el código de 6 dígitos completo.",
              true,
            );
            return;
          }

          const originalBtnText = verifySubmitBtn.innerHTML;
          verifySubmitBtn.innerHTML =
            '<span class="material-symbols-outlined animate-spin align-middle mr-2" style="animation: spin 1s linear infinite;">progress_activity</span>Verificando...';
          verifySubmitBtn.disabled = true;

          try {
            const response = await fetch(`${API_BASE}/api/auth/verificar-mfa`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ username: username, codigo: code }),
            });

            const data = await response.json();

            if (data.estado === true) {
              localStorage.removeItem("temp_username");
              localStorage.setItem(
                "usuario",
                JSON.stringify({ username: data.username, rol: data.rol, email: data.email || "" }),
              );
              if (data.rol === "ADMINISTRADOR") {
                window.location.href = "administrador/dashboard.html";
              } else {
                window.location.href = "participante/index.html";
              }
            } else {
              showCustomAlert(
                "Error de verificación",
                data.mensaje || "Código incorrecto",
                true,
              );
            }
          } catch (error) {
            console.error("Error:", error);
            showCustomAlert(
              "Error de conexión",
              "No se pudo conectar con el servidor.",
              true,
            );
          } finally {
            verifySubmitBtn.innerHTML = originalBtnText;
            verifySubmitBtn.disabled = false;
          }
        });
      });
    </script>
  </body>
</html>
